<!DOCTYPE html>
<html>
<head>
    <title>MINECOFIN Asset Tracking System</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

</head>
<body>

<div class="container mt-5">

    <h1 class="mb-4">
        MINECOFIN Asset Tracking System
    </h1>

    <div class="row">

        <div class="col-md-3">
            <div class="card text-center">
                <div class="card-body">
                    <h2>{{ computers }}</h2>
                    <p>Computers</p>
                </div>
            </div>
        </div>

        <div class="col-md-3">
            <div class="card text-center">
                <div class="card-body">
                    <h2>{{ vehicles }}</h2>
                    <p>Vehicles</p>
                </div>
            </div>
        </div>

        <div class="col-md-3">
            <div class="card text-center">
                <div class="card-body">
                    <h2>{{ projectors }}</h2>
                    <p>Projectors</p>
                </div>
            </div>
        </div>

        <div class="col-md-3">
            <div class="card text-center">
                <div class="card-body">
                    <h2>{{ employees }}</h2>
                    <p>Employees</p>
                </div>
            </div>
        </div>

    </div>

</div>

</body>
</html>
