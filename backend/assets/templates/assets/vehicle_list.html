{% extends 'assets/base.html' %}

{% block content %}

<h2>Vehicles</h2>

<a class="btn btn-primary mb-3" href="/vehicles/add/">Add Vehicle</a>

<table class="table table-bordered">

<tr>
    <th>Tag</th>
    <th>Brand</th>
    <th>Model</th>
    <th>Status</th>
    <th>Actions</th>
</tr>

{% for v in vehicles %}
<tr>
    <td>{{ v.asset_tag }}</td>
    <td>{{ v.brand }}</td>
    <td>{{ v.model }}</td>
    <td><span class="badge bg-success">{{ v.status }}</span></td>
    <td>
        <a class="btn btn-warning btn-sm" href="/vehicles/edit/{{ v.id }}/">Edit</a>
        <a class="btn btn-danger btn-sm" href="/vehicles/delete/{{ v.id }}/">Delete</a>
    </td>
</tr>
{% endfor %}

</table>

{% endblock %}
